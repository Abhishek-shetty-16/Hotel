{% extends 'base.html' %}
{% block title %}Register - Prakruthi Refreshment{% endblock %}
{% block extra_css %}
<style>
  .auth-container { max-width: 480px; margin: 3rem auto; }
  .auth-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 2.5rem; }
  .auth-logo { text-align: center; margin-bottom: 2rem; }
  .auth-logo .logo-icon { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
  .auth-logo h2 { font-family: 'Playfair Display', serif; color: var(--green-dark); font-size: 1.7rem; }
  .auth-logo p { color: var(--text-muted); font-size: 0.9rem; }
  .form-group { margin-bottom: 1.2rem; }
  .form-group label { display: block; font-weight: 600; font-size: 0.88rem; color: var(--green-dark); margin-bottom: 6px; }
  .form-group input, .form-group textarea {
    width: 100%; padding: 12px 14px;
    border: 2px solid #e8f5e9; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
    outline: none; transition: border-color 0.2s; resize: none;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--green-mid); }
  .optional { font-size: 0.75rem; color: var(--text-muted); font-weight: 400; }
  .auth-btn {
    width: 100%; padding: 14px;
    background: var(--saffron); color: #fff; border: none;
    border-radius: 12px; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: background 0.2s; margin-top: 0.5rem;
  }
  .auth-btn:hover { background: #d4604a; }
  .auth-link { text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem; }
  .auth-link a { color: var(--green-mid); font-weight: 600; text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<div class="main-content">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">🌿</span>
        <h2>Create Account</h2>
        <p>Join Prakruthi Refreshment today</p>
      </div>
      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" name="phone" placeholder="10-digit mobile number" required>
        </div>
        <div class="form-group">
          <label>Email <span class="optional">(optional)</span></label>
          <input type="email" name="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>Delivery Address <span class="optional">(optional)</span></label>
          <textarea name="address" rows="2" placeholder="Your delivery address"></textarea>
        </div>
        <button type="submit" class="auth-btn">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>
      <div class="auth-link">
        Already have an account? <a href="/login/">Sign in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
